name: CI Build and Dockerize

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test
        run: mvn clean install

      # NEW: This step converts the repository name to lowercase
      - name: Lowercase Repository Name
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # UPDATED: Using the lowercase variable env.REPO_LOWER
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/fees-engine-core:latest
            ghcr.io/${{ env.REPO_LOWER }}/fees-engine-core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
