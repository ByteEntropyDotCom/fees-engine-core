name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        # Run tests and generate the JAR
        run: mvn clean install -DskipTests=false

      - name: Run Tests & Check Coverage
        # Ensures 100% of the financial math is validated
        run: mvn test

  security-scan:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Dependency Check
        # Scans for vulnerabilities in financial libraries (e.g., Moneta)
        uses: snyk/snyk-github-actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  docker-build-and-push:
    needs: [build-and-test, security-scan]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tags the image with the git hash for traceability
          tags: |
            ghcr.io/${{ github.repository }}/fees-engine-core:latest
            ghcr.io/${{ github.repository }}/fees-engine-core:${{ github.sha }}
          # Enables Docker layer caching to speed up CI
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-staging:
    needs: docker-build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Deployment
        run: |
          echo "Deploying version ${{ github.sha }} to Staging Environment..."
          # Here you would trigger ArgoCD, Terraform, or a Kubernetes rollout
